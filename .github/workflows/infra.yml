name: Terraform Plan

on:
  pull_request:
    paths:
      - "infra/**"

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write   # needed to post plan as PR comment

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        working-directory: infra
        run: terraform init -input=false

      - name: Terraform Format Check
        working-directory: infra
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: infra
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: infra
        env:
          # Root-level variables declared in infra/variables.tf must each
          # be supplied here. The previous TF_VAR_db_username / db_password
          # were leftovers from the unwired RDS module — db_* vars only
          # exist inside infra/modules/rds/variables.tf, so passing them
          # at the root level was a no-op. Dropped.
          TF_VAR_secret_key: ${{ secrets.TF_SECRET_KEY }}
          TF_VAR_internal_api_secret: ${{ secrets.TF_INTERNAL_API_SECRET }}
        # `-input=false` is critical: without it, a missing TF_VAR will
        # cause terraform to hang at an interactive prompt for ~6h (the
        # GitHub Actions runner timeout) instead of failing fast in
        # seconds. This is what caused the 40-min stall on PR #122.
        run: terraform plan -input=false -no-color 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n\n... (truncated)'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Terraform Plan\n\`\`\`\n${truncated}\n\`\`\``
            });

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1
